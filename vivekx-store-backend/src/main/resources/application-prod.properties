# ==========================================
# SPRING BOOT - PRODUCTION CONFIGURATION
# (Neon PostgreSQL on Render)
# ==========================================

spring.application.name=myfirstAppp
server.port=${PORT:8080}

# ──────────────────────────────────────────
# DATABASE — Neon PostgreSQL
# Set these environment variables in Render:
#   DB_URL      = jdbc:postgresql://ep-xxx.us-east-1.aws.neon.tech/neondb?sslmode=require
#   DB_USERNAME = your-neon-username
#   DB_PASSWORD = your-neon-password
# ──────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# validate = checks schema matches entities at startup without altering anything
# Use 'update' only if you want Hibernate to auto-migrate; 'validate' is safer for production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Neon uses SSL by default via sslmode=require in the URL — no extra config needed here.

# ──────────────────────────────────────────
# MAIL SMTP
# ──────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ──────────────────────────────────────────
# RAZORPAY
# ──────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# ──────────────────────────────────────────
# LOGGING (production — minimal noise)
# ──────────────────────────────────────────
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.web=INFO
logging.level.com.zaxxer.hikari=ERROR
