# ===============================
# APP
# ===============================
spring.application.name=myfirstAppp
server.port=${PORT:8080}

# ===============================
# DATABASE - Neon PostgreSQL
# All values injected via environment variables.
# For local dev, set these in your shell or a .env file.
# Example Neon URL format:
#   jdbc:postgresql://ep-xxxxx.us-east-1.aws.neon.tech/neondb?sslmode=require
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Neon requires SSL — this passes through the JDBC URL flag (sslmode=require)
# No extra Hibernate SSL config needed when sslmode=require is in the URL.

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.cache=false

# ===============================
# DEBUG LOGGING
# ===============================
logging.level.org.springframework.security=DEBUG
logging.level.com.example.demo=DEBUG
