# docker-compose.yml — LOCAL DEV ONLY (not used on Render)
# This connects the Spring Boot backend to Neon PostgreSQL via environment variables.
# Copy .env.example to .env and fill in your Neon credentials before running.
#
# Usage:
#   docker compose up --build

services:
  backend:
    build: .
    container_name: vivekx-backend
    ports:
      - "8080:8080"
    environment:
      # Neon PostgreSQL — set your real values in a local .env file
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      # Mail (optional for local dev)
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      # Razorpay (optional for local dev)
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}